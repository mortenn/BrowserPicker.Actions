name: BrowserPicker CI

on:
  workflow_call:
    inputs:
      publish_deliverables:
        description: "Whether to publish build artifacts and installer deliverables."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    if: ${{ !inputs.publish_deliverables }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Restore tools
        shell: bash
        run: dotnet tool restore

      - name: Check CSharpier formatting
        id: csharpier
        continue-on-error: true
        shell: bash
        run: dotnet csharpier check . 2>&1 | tee csharpier.log

      - name: Check XAML formatting
        id: xamlstyler
        continue-on-error: true
        shell: bash
        run: dotnet xstyler -r -d src -p 2>&1 | tee xamlstyler.log

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: dotnet test BrowserPicker.sln -p:Version=1.0.0 2>&1 | tee dotnet-test.log

      - name: Build PR validation summary
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p pr-validation-summary

          summarize_log() {
            local label="$1"
            local file="$2"

            {
              echo "### ${label}"
              echo
              echo "<details><summary>Output</summary>"
              echo
              echo '```text'
              if [ -f "$file" ]; then
                sed -n '1,120p' "$file"
              else
                echo "No output captured."
              fi
              echo '```'
              echo
              echo "</details>"
              echo
            } >> pr-validation-summary/summary.md
          }

          {
            echo "<!-- pr-validation-summary -->"
            echo "## PR Validation"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| CSharpier | ${{ steps.csharpier.outcome }} |"
            echo "| XamlStyler | ${{ steps.xamlstyler.outcome }} |"
            echo "| dotnet test | ${{ steps.tests.outcome }} |"
            echo
          } > pr-validation-summary/summary.md

          summarize_log "CSharpier" "csharpier.log"
          summarize_log "XamlStyler" "xamlstyler.log"
          summarize_log "dotnet test" "dotnet-test.log"

      - name: Upload PR validation summary
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-validation-summary
          path: pr-validation-summary

      - name: Fail when validation checks fail
        if: ${{ always() && (steps.csharpier.outcome != 'success' || steps.xamlstyler.outcome != 'success' || steps.tests.outcome != 'success') }}
        shell: bash
        run: exit 1

  prepare:
    if: ${{ inputs.publish_deliverables }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_suffix: beta${{ steps.version.outputs.increment }}
      package_version: ${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}.${{ steps.version.outputs.patch }}.${{ steps.version.outputs.increment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: paulhatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3 # v5.4.0
        with:
          version_format: "${major}.${minor}.${patch}"

  schema:
    if: ${{ inputs.publish_deliverables }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate settings schema
        run: dotnet run --project tools/BrowserPicker.SchemaGen/BrowserPicker.SchemaGen.csproj -- schemas/browserpicker-settings.schema.json

      - name: Verify generated schema is committed
        run: git diff --exit-code -- schemas/browserpicker-settings.schema.json

      - name: Upload schema artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: BrowserPicker-settings-schema
          path: schemas/browserpicker-settings.schema.json

  dependent:
    if: ${{ inputs.publish_deliverables }}
    runs-on: windows-latest
    needs: prepare
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Restore tools
        shell: bash
        run: dotnet tool restore

      - name: Restore application
        shell: bash
        run: dotnet restore BrowserPicker.sln -p VersionPrefix=${{ needs.prepare.outputs.version }} -p VersionSuffix=${{ needs.prepare.outputs.version_suffix }}

      - name: Publish application
        shell: bash
        run: dotnet publish -c ${{ matrix.configuration }} src/BrowserPicker.UI/BrowserPicker.UI.csproj -p VersionPrefix=${{ needs.prepare.outputs.version }} -p VersionSuffix=${{ needs.prepare.outputs.version_suffix }}

      - name: Create installer
        shell: bash
        run: dotnet build dist/Dependent/Dependent.wixproj --no-dependencies -c ${{ matrix.configuration }} -p Version=${{ needs.prepare.outputs.package_version }}

      - name: Upload msi
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: DependentSetup-${{ needs.prepare.outputs.version }}-${{ matrix.configuration }}
          path: dist/Dependent/bin/${{ matrix.configuration }}

      - name: Upload bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Dependent-${{ needs.prepare.outputs.version }}-${{ matrix.configuration }}
          path: src/BrowserPicker.UI/bin/${{ matrix.configuration }}/net10.0-windows/publish

  portable:
    if: ${{ inputs.publish_deliverables }}
    runs-on: windows-latest
    needs: prepare
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Restore tools
        shell: bash
        run: dotnet tool restore

      - name: Restore application
        shell: bash
        run: dotnet restore BrowserPicker.sln -p VersionPrefix=${{ needs.prepare.outputs.version }} -p VersionSuffix=${{ needs.prepare.outputs.version_suffix }} -r win-x64 -p:PublishSingleFile=true

      - name: Publish application
        shell: bash
        run: dotnet publish -c ${{ matrix.configuration }} src/BrowserPicker.UI/BrowserPicker.UI.csproj -p VersionPrefix=${{ needs.prepare.outputs.version }} -p VersionSuffix=${{ needs.prepare.outputs.version_suffix }} -r win-x64 -p:PublishSingleFile=true

      - name: Create installer
        shell: bash
        run: dotnet build dist/Portable/Portable.wixproj --no-dependencies -c ${{ matrix.configuration }} -p Version=${{ needs.prepare.outputs.package_version }}

      - name: Upload msi
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: PortableSetup-${{ needs.prepare.outputs.version }}-${{ matrix.configuration }}
          path: dist/Portable/bin/${{ matrix.configuration }}

      - name: Upload bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Portable-${{ needs.prepare.outputs.version }}-${{ matrix.configuration }}
          path: src/BrowserPicker.UI/bin/${{ matrix.configuration }}/net10.0-windows/win-x64/publish
