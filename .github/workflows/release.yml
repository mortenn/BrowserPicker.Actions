name: BrowserPicker Release

on:
  workflow_call:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: paulhatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3 # v5.4.0
        with:
          version_format: "${major}.${minor}.${patch}"

  dependent:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Restore tools
        shell: bash
        run: dotnet tool restore

      - name: Restore application
        shell: bash
        run: dotnet restore BrowserPicker.sln -p VersionPrefix=${{ needs.prepare.outputs.version }}

      - name: Publish application
        shell: bash
        run: dotnet publish -c Release src/BrowserPicker.UI/BrowserPicker.UI.csproj -p VersionPrefix=${{ needs.prepare.outputs.version }}

      - name: Create installer
        shell: bash
        run: dotnet build dist/Dependent/Dependent.wixproj --no-dependencies -c Release -p Version=${{ needs.prepare.outputs.version }}

      - name: Upload msi
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: DependentSetup-${{ needs.prepare.outputs.version }}-Release
          path: dist/Dependent/bin/Release

      - name: Upload bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Dependent-${{ needs.prepare.outputs.version }}-Release
          path: src/BrowserPicker.UI/bin/Release/net10.0-windows/publish

  portable:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Restore tools
        shell: bash
        run: dotnet tool restore

      - name: Restore application
        shell: bash
        run: dotnet restore BrowserPicker.sln -p VersionPrefix=${{ needs.prepare.outputs.version }} -r win-x64 -p:PublishSingleFile=true

      - name: Publish application
        shell: bash
        run: dotnet publish -c Release src/BrowserPicker.UI/BrowserPicker.UI.csproj -p VersionPrefix=${{ needs.prepare.outputs.version }} -r win-x64 -p:PublishSingleFile=true

      - name: Create installer
        shell: bash
        run: dotnet build dist/Portable/Portable.wixproj --no-dependencies -c Release -p Version=${{ needs.prepare.outputs.version }}

      - name: Upload msi
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: PortableSetup-${{ needs.prepare.outputs.version }}-Release
          path: dist/Portable/bin/Release

      - name: Upload bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Portable-${{ needs.prepare.outputs.version }}-Release
          path: src/BrowserPicker.UI/bin/Release/net10.0-windows/win-x64/publish

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, dependent, portable]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Retrieve artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Package bundles
        run: |
          rm -rf *.zip
          for bundle in Dependent Portable; do
            (cd $bundle-${{ needs.prepare.outputs.version }}-Release; zip -r ../$bundle.zip *)
          done

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          draft: true
          prerelease: true
          files: |
            DependentSetup-${{ needs.prepare.outputs.version }}-Release/BrowserPicker.msi
            PortableSetup-${{ needs.prepare.outputs.version }}-Release/BrowserPicker-Portable.msi
            schemas/browserpicker-settings.schema.json
            Dependent.zip
            Portable.zip
